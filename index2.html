<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root{
    --blau:#0a6aa1;
    --blau-dunkel:#084d73;
    --grau:#f4f6f8;
    --text:#222;
}

*{
    box-sizing:border-box;
}

body{
    font-family:"Inter",sans-serif;
    background:var(--grau);
    color:var(--text);
    max-width:1300px;
    margin:0 auto;
    padding:20px;
    line-height:1.6;
}

h1{
    color:var(--blau);
    margin-bottom:25px;
}

nav{
    background:white;
    padding:20px 25px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
    margin-bottom:30px;
}

nav a{
    text-decoration:none;
    color:var(--blau);
    font-weight:600;
    margin-right:20px;
    transition:0.3s;
}

nav a:hover{
    color:var(--blau-dunkel);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
    transition:all 0.25s ease;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card img{
    width:100%;
    height:280px;
    object-fit:cover;
    display:block;
}

.card-content{
    padding:18px;
}

.card h3{
    margin-top:0;
    margin-bottom:8px;
    color:var(--blau);
    font-size:1rem;
    line-height:1.4;
}

.card p{
    margin-bottom:15px;
    color:#555;
    font-size:0.95rem;
}

.btn{
    display:inline-block;
    background:var(--blau);
    color:white;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    font-size:0.95rem;
    font-weight:600;
    transition:0.3s;
}

.btn:hover{
    background:var(--blau-dunkel);
}

@media(max-width:700px){

    body{
        padding:15px;
    }

    nav a{
        display:block;
        margin-bottom:12px;
    }

    .card img{
        height:240px;
    }
}

</style>
