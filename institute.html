<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standorte der SiWaWiPro-Institute</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
      color: #222;
    }

    h1 {
      color: #0a6aa1;
    }

    #map {
      height: 600px;
      border-radius: 10px;
      margin-top: 20px;
    }

    nav a {
      margin-right: 15px;
      text-decoration: none;
      color: #0a6aa1;
    }

    .box {
      background: #f5f7f9;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Standorte der SiWaWiPro-Institute</h1>

<nav>
  <a href="index.html">Start</a>
  </nav>

<div class="box">
  <p>
    Diese Karte zeigt alle Standorte der SiWaWiPro-Institute in Deutschland.
  </p>
</div>

<div id="map"></div>

<script>
  // Karte initialisieren (Deutschland zentriert)
  var map = L.map('map').setView([51.2, 10.4], 6);

  // OpenStreetMap Layer
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Institute Marker

 
  L.marker([53.45650, 9.96833]).addTo(map)
  .bindPopup("<b>Technische Universität Hamburg (TUHH)</b><br>Wasserressourcen und Wasserversorgung");
  
  L.marker([52.38211, 9.71774]).addTo(map)
  .bindPopup(`
    <b>Leibniz Universität Hannover</b><br>
    Institut für Siedlungswasserwirtschaft und Abfalltechnik (ISAH)<br><br>
    <a href="https://www.isah.uni-hannover.de" target="_blank">
      Zur Website des ISAH
    </a>
  `);

  L.marker([48.1351, 11.5820]).addTo(map)
    .bindPopup("<b>TU München</b><br>Lehrstuhl und der Versuchsanstalt für Siedlungswasserwirtschaft");

 L.marker([51.3127, 9.4797]).addTo(map)
    .bindPopup("<b>Universität Kassel</b><br>Fachgebiet Siedlungswasserwirtschaft");

  L.marker([51.0504, 13.7373]).addTo(map)
    .bindPopup("<b>TU Dresden</b><br>Professur für Urban Water Management");

  L.marker([50.7788, 6.0789]).addTo(map)
  .bindPopup(`
    <b>RWTH Aachen University</b><br>
    Institut für Siedlungswasserwirtschaft (ISA)<br><br>
    <a href="https://www.isa.rwth-aachen.de" target="_blank">
      Zur Website des ISA
    </a>
  `);

 L.marker([50.9807, 11.3293]).addTo(map)
  .bindPopup(`
    <b>Bauhaus Universität Weimar</b><br>
    Professur Siedlungswasserwirtschaft und Technologien urbaner Stoffstromnutzungen<br><br>
    <a href="https://www.uni-weimar.de/de/bau-und-umwelt/professuren/siedlungswasserwirtschaft/" target="_blank">
      Zur Website der Professur
    </a>
  `);

 L.marker([49.8728, 8.6512]).addTo(map)
  .bindPopup(`
    <b>TU Darmstadt</b><br>
    Institut IWAR<br><br>
    <a href="https://www.iwar.tu-darmstadt.de/iwarinstitut/" target="_blank">
      Zur Website des IWAR
    </a>
  `);

L.marker([52.2736, 10.5289]).addTo(map)
  .bindPopup(`
    <b>TU Braunschweig</b><br>
    Institut für Siedlungswasserwirtschaft (ISWW)<br><br>
    <a href="https://www.tu-braunschweig.de/isww" target="_blank">
      Zur Website des ISWW
    </a>
  `);

L.marker([54.0887, 12.1334]).addTo(map)
  .bindPopup(`
    <b>Universität Rostock</b><br>
    Professur für Wasserwirtschaft (ISWW)<br><br>
    <a href="https://www.auf.uni-rostock.de/professuren/bau-und-umweltbereich/wasserwirtschaft/" target="_blank">
      Zur Website der Professur
    </a>
  `);

L.marker([48.0812, 11.6406]).addTo(map)
  .bindPopup(`
    <b>Universität der Bundeswehr München</b><br>
    Professur für Siedlungswasserwirtschaft und Abfalltechnik (SWA)<br><br>
    <a href="https://www.unibw.de/wasserwesen/swa" target="_blank">
      Zur Website der Professur
    </a>
  `);
  
</script>

</body>
</html>
