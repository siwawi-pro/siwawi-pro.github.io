<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standorte der SiWaWiPro-Institute</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  </head>
<style>

:root{
    --blau:#0a6aa1;
    --hellblau:#e9f5fb;
    --grau:#f4f6f8;
    --text:#222;
}

*{
    box-sizing:border-box;
}

body{
    font-family:"Inter",sans-serif;
    background: linear-gradient(135deg, #e0f2fe 0%, #38bdf8 40%, #0ea5e9 100%);
    color:var(--text);
    max-width:1000px;
    margin:0 auto;
    padding:0 20px 40px;
    line-height:1.7;
}

h1{
    color:var(--blau);
    margin-top:40px;
}

nav{
    background:white;
    padding:20px 25px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
    margin-top:20px;
}

nav a{
    text-decoration:none;
    color:var(--blau);
    font-weight:600;
    margin-right:20px;
    transition:0.3s;
}

nav a:hover{
    color:#05507b;
}

.box{
    background:white;
    padding:25px;
    border-radius:15px;
    margin-top:25px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
    border-left:6px solid var(--blau);
}

#map{
    height:600px;
    margin-top:25px;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.leaflet-popup-content{
    line-height:1.5;
}

.leaflet-popup-content a{
    color:var(--blau);
    font-weight:600;
    text-decoration:none;
}

.leaflet-popup-content a:hover{
    text-decoration:underline;
}

@media (max-width:700px){

    body{
        padding:0 15px 30px;
    }

    nav a{
        display:block;
        margin-bottom:10px;
    }

    #map{
        height:500px;
    }
}

</style>
<body>

<nav>

  <a href="kontakt.html">Kontakt</a>
</nav>
