<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professor*innen in SiWaWiPro</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      color: #222;
    }

    h1 {
      color: #0a6aa1;
    }

    /* Kachel-Layout */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      width: 220px;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      transition: transform 0.2s;
      background: white;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
    }

    .card h3 {
      margin: 10px 0 5px 0;
      color: #0a6aa1;
    }

    .card p {
      margin: 0;
      font-size: 14px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      background: #0a6aa1;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
    }

    .btn:hover {
      background: #084d73;
    }
  </style>
</head>

<body>

<h1>Professor*innen</h1>

<div class="grid">

  <!-- Person 1 -->
  <div class="card">
    <img src="prof/koester.jpg" alt="Stephan Koester">
    <h3>Prof. Dr.-Ing. <br>Stephan Köster</h3>
    <p>Siedlungswasserwirtschaft</p>
    <a class="btn" href="profil-koester.html">Profil</a>
  </div>

  <!-- Person 2 -->
  <div class="card">
    <img src="images/person2.jpg" alt="Person 2">
    <h3>Prof. Schmidt</h3>
    <p>Wasserchemie</p>
    <a class="btn" href="profil-schmidt.html">Profil</a>
  </div>

  <!-- Person 3 -->
  <div class="card">
    <img src="images/person3.jpg" alt="Person 3">
    <h3>Dr. Weber</h3>
    <p>Modellierung</p>
    <a class="btn" href="profil-weber.html">Profil</a>
  </div>

 <!-- Person 4 -->
  <div class="card">
    <img src="images/person4.jpg" alt="Person 4">
    <h3>Dr. Meier</h3>
    <p>Modellierung</p>
    <a class="btn" href="profil-meier.html">Profil</a>
  </div>

</div>

</body>
</html>
